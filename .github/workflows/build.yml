name: CUPS Snap CI - Unified Build Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # Added this so the bot can post the PR comment

jobs:
  # Job 1: Build the snap once per native architecture and publish it as an
  # artifact.  The per-mode tests download it, so the (slow) snap build runs
  # once per arch instead of once per mode.
  build-native:
    name: Build Native (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout cups-snap sources
        uses: actions/checkout@v4

      - name: Print Ubuntu version
        run: |
          set -e
          cat /etc/os-release | grep PRETTY_NAME | awk -F '=' '{print $2}'

      - name: Build CUPS snap with Snapcraft action
        id: snapcraft
        uses: snapcore/action-build@v1
        with:
          path: .

      - name: Upload CUPS snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: cups-snap-${{ matrix.arch }}
          path: ./*.snap
          if-no-files-found: error

  # Job 2: Test each native snap in all three run-cupsd operating modes
  # (stand-alone, proxy, parallel).  Each (arch, mode) runs in its own fresh
  # job so the modes can't interfere with each other (e.g. who owns port 631)
  # and a failure points at exactly one mode.
  test-native:
    name: Test ${{ matrix.arch }} (${{ matrix.mode }})
    needs: build-native
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runs-on: ubuntu-latest,    mode: standalone }
          - { arch: amd64, runs-on: ubuntu-latest,    mode: proxy }
          - { arch: amd64, runs-on: ubuntu-latest,    mode: parallel }
          - { arch: arm64, runs-on: ubuntu-24.04-arm, mode: standalone }
          - { arch: arm64, runs-on: ubuntu-24.04-arm, mode: proxy }
          - { arch: arm64, runs-on: ubuntu-24.04-arm, mode: parallel }
    steps:
      - name: Checkout cups-snap sources
        uses: actions/checkout@v4

      - name: Download the built snap
        uses: actions/download-artifact@v4
        with:
          name: cups-snap-${{ matrix.arch }}
          path: snap-artifact

      - name: Sandbox integration test (${{ matrix.mode }} mode)
        run: |
          set -e
          SNAP_FILE="$(ls snap-artifact/*.snap | head -1)"
          echo "Testing ${{ matrix.mode }} mode with ${SNAP_FILE}"
          sudo sh tests/sandbox-test.sh "${{ matrix.mode }}" "${SNAP_FILE}"

      - name: Cleanup - Remove installed snap
        if: always()
        run: |
          echo "Removing CUPS snap..."
          sudo snap remove cups || true

  # Job 3: Build the armhf snap *natively* -- no QEMU, no Launchpad.  The arm64
  # runner's CPU executes 32-bit ARM (AArch32) directly and Ubuntu's arm64 kernel
  # enables CONFIG_COMPAT, so an armhf (linux/arm/v7) container runs at native
  # speed.  This avoids both the slow Launchpad remote-build and the qemu-user
  # armhf failures seen when emulating on an amd64 host.  (riscv64 has no native
  # GitHub runner and a whole-stack snap is impractical to emulate, so it stays
  # on the Snap Store edge channel -- see test-edge-snaps.yml.)
  build-armhf:
    name: Build armhf (native on arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout cups-snap sources
        uses: actions/checkout@v4

      - name: Build the armhf snap in a core22 armhf container
        run: |
          set -e
          # diddledani/snapcraft:core22 is the snapcraft build environment; the
          # linux/arm/v7 variant runs natively on this arm64 host.
          docker run --rm \
            --platform linux/arm/v7 \
            --privileged \
            --volume "$PWD":/data --workdir /data \
            diddledani/snapcraft:core22 \
            snapcraft --destructive-mode --verbose

      - name: Smoke test (armhf)
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y qemu-user-static squashfs-tools file
          SNAP_FILE="$(ls ./*.snap | head -1)"
          sh tests/smoke-unpacked.sh "$SNAP_FILE" qemu-arm-static

      - name: Upload CUPS snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: cups-snap-armhf
          path: ./*.snap
          if-no-files-found: error
